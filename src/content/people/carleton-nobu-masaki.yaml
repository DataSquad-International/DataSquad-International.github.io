bio: "I'm an international student from Tokyo, Japan. During my sophomore summer, I worked as an analyst, running statistical models on restaurant data, at a startup in Tokyo. Experiencing statistical modeling in the field was a valuable experience, but I want to improve my understanding on machine learning and advanced statistical models so that I can eventually become a capable data scientist. Outside of work, I like to take walks and play guitar."
