bio: "After graduating from Carleton with a major in Mathematics/Statistics, I worked as a Data & Policy Analyst for a consulting firm on analyzing Medicare data to inform FDA post-market vaccine safety surveillance and policy evaluation. After two years of working, I decided to pursue a MS in Biostatistics at UNC Chapel Hill followed by a PhD in Epidemiology also at UNC. Now at UNC, I am focused on pharmacoepidemiology, which evaluates the safety and effectiveness of medical products and interventions. I am also a fellow in the Health Economics and Outcomes Research (HEOR) group at Bristol Myers Squibb, a pharmaceutical company, focusing on oncology and hematology products. I am hoping to work in pharma or consulting post-PhD graduation in HEOR or Real-World Evidence functions."
