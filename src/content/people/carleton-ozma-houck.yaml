bio: "I am a PhD Student at the University of Chicago studying environmental and energy economics. Before that, I was a Math and Economics double major at Carleton. Before graduate school, I spent two years working as an economics research assistant at the Booth School of Business. I am interested using traditional economic methods alongside tools from climate science and machine learning to study the socioeconomic impacts of climate and weather."
