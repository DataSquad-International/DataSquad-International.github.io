bio: "Hi! I’m a data nerd from Seattle. At Carleton, I majored in Computer Science. On the DataSquad, I focused on data wrangling and visualization using Python, R, and Tableau to help professors prepare data for publication. Now, I use the skills I learned as the foundation of my job, doing sustainability data science for Instagram. For more up to date information, check my LinkedIn profile."
