bio: "Hi! I’m Nina, and I graduated with a major in Statistics and a minor in Digital Arts and Humanities. My college journey opened doors to a dynamic career in data, and I’m now a Senior Data Analyst at a Fortune 500 company. In my current role, I focus on data manipulation, visualization, and analysis to help drive strategic decisions. I also work with the latest technologies in Generative AI (GenAI), overseeing use case governance and developing solutions using Palantir Foundry. This blend of technical and strategic work keeps my days both challenging and rewarding. Looking back, joining the Data Squad was one of the best decisions I made as a student. It gave me hands-on experience with Scrum development, project management, and understanding real client needs—skills that are essential in the workplace. These experiences not only prepared me for job interviews but also gave me confidence when facing real-world challenges. If you’re just starting out, my advice is to get involved in projects and organizations that you enjoy working with. Every experience helps shape your unique story and makes you stand out to future employers. The possibilities after graduation are vast, and your journey is just beginning!"
