bio: "My name is David, and I'm a DataSquad alum. I graduated in 2023 in Computer Science and Statistics, and I'm now I'm in Los Angeles. I'm currently in a Ph.D program in Computer Science focusing on the intersection of mental health, social media, and AI. I was with the Squad for the majority of my college years at Carleton, mainly working as a project management intern. I really enjoyed my time here and gained valuable skills and memorable experiences. The DataSquad is a great transition from inside the classroom to the outside world. 10/10 highly recommend :)"
