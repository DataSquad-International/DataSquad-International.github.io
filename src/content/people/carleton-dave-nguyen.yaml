bio: "Hi everyone, I'm Dave Nguyen, currently a SWE at Microsoft, living in New York City. Besides working, I also worked as a mentor/teacher for OlaClass, a program to help students find job opportunities in Big Tech. I also built WeShare, a group cashback app with 50k+ users. It is such crazy that it has already been 4 years since I joined DataSquad. 4 years ago, when I joined DataSquad, I didn't know Git, ReactJS, or have built any full-stack application. But by joining projects, working with teammates, and talking with Paula weekly to solve new problems, I learn a lot, which helped me land an internship at Amazon, Microsoft. In the future, I want to keep building projects, helping more students to find job opportunities, and passion in tech!"
