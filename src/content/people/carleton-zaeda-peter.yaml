bio: "Originally from Laborie, Saint Lucia, I’m Zaeda Peter, a senior majoring in Economics with minors in French and Public Policy. I’m passionate about international development, curious about how systems shape everyday life, and always excited to learn how data can be used to help people. When I’m not cooking, you’ll probably find me crocheting or practicing another fiber art."
