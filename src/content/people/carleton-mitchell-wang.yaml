bio: "Hi I'm Mitchell and I love challenges. As an adventurer who is passionate to explore different academic subjects and career fields, I find nothing more exciting than staring at my notebook or computer screen trying to figure out the most efficient way to solve problems. From being an equity analyst intern to a pharmaceutical industry consulting intern and then to a warehouse operations intern, my curiosity to learn new things never ends. With a liberal arts background, I have the necessary skills and abilities to adapt to new environments and learn quickly, which enable me to reach my full potential. In my undergraduate study, I take a variety of courses from Astronomy to Japanese to Religion Studies. Meanwhile, my programming and analytical skills developed through being a Computer Science and Statistics major also enable me to have strong hard skills at my disposal. I also love to find new adventures in my personal life. I love traveling, sports, and music. Feel free to reach out."
