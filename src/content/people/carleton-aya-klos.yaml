bio: "Hello! My name is Aya and I am a junior Biology major (undeclared math minor) at Carleton from the Chicago suburbs. I enjoy using data analysis and data visualization in biological research and have come to recognize the critical importance of these skills in research. Most of my research experience in biology has been in ecology, however, I am additionally very interested in neuroscience and biochemistry and hope to continue exploring the intersection between statistics and different fields of biology. I recently discovered a love for applied math and hope to branch out into bioengineering as well. I really enjoy learning and problem-solving and am incredibly excited to be joining the DataSquad and helping others."
