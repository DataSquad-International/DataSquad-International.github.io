bio: "Hi, I am Noah and I am a Sophomore prospective computer science and statistics major. I've always been interested in math and computers from video games so progressing to data science which is the intersection of both seemed natural to me. I am really excited to go deep into some data work and help people solve real problems with their data. Other than that, I am also a swimmer on the D3 team and I volunteer as a mentor for Project Friendship."
