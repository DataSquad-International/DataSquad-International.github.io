bio: "Hailing from Southern California, I traded in my warm weather for a chance to work with snow and data. Though my major is Psychology, I have skills with Python, and Java. I do graphic design work and love to teach others about Virtual Reality. Ask me about any new tech and you'll have an hour conversation. My time with DataSquad has helped me so much in very unexpected ways. What I have learned in my short time with DataSquad, I have been able to use in my classes to expidite classwork and my personal life to learn more about what I do."
