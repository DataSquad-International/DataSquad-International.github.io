bio: "Hi! I'm a Class of 2021 math major from Tokyo, Japan with a minor in cognitive science. The beauty of logic in pure mathematics brought me to be a math major at the end of my freshman year, but summer research experiences opened my eyes to the fascination of applying math to real world issues through coding. I'm really excited to join DataSquad and improve upon my skills on various data-oriented projects."
