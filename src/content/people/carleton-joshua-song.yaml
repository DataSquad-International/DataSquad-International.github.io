bio: "Hello everyone! My name is Joshua Song and I majored in computer science in the class of 2023. I used to live in Canada, so the Toronto Raptors and the Toronto Bluejays are my teams. If you are one of the rare Toronto fans, please let me know so we can cheer for them together against all the American teams~ I was glad to be a part of DataSquad during my time at Carleton and hope you also have a great time gaining experience and learning valuable skills!"
