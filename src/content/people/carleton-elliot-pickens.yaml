bio: "I'm currently a PhD student in the Computer and Information Science department at the University of Pennsylvania, where I am co-advised by Duncan Watts and Chris Callison-Burch. Prior to joining the CIS department, I was briefly a student at the University of Wisconsin-Madison, and before that, I was a pre-doctoral research fellow at MSR-NYC. I earned my Master's in Operations Research and Information Engineering (ORIE) at Cornell Tech and I majored in math at Carleton. My research interests lie at the intersection of computational social science, natural language processing, and Bayesian statistics. I'm particularly passionate about developing new methods and tools that can help social scientists better understand and analyze complex phenomena through computational approaches."
