bio: "Akam! (Greetings in Oromo) I graduated from Carleton in 2025 with a major in computer science and a minor in data science & statistics. I plan to attend graduate school soon in either law or another field. In the meantime, I work in the African community in Minnesota and plan to use what I learned to further my advocacy goals."
