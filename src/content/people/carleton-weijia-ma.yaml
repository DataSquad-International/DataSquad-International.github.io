bio: "I worked on the Physics Inventory Database interface. The database tracks the lab equipment and demonstrations that the Carleton Physics Department have in stock. The default interface that goes with FileMaker is not very user friendly and I am working to make the process of data entry, searching and Browse more instinctive and automatic. I am also helping with FileMaker related questions for the Mazi Archaeological Project. I like to swim and play badminton. I can never do with enough nerdy jokes and puns, especially physics ones. I just started in the CS and data science area, but I really love it so far."
