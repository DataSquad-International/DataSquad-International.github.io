bio: "Hi everyone! I’m Jimmy, Carleton College Class of 2023. I majored in Biology and Computer Science. I came to Carleton in 2019 fascinated by biological systems and drawn to studying them from a systems perspective. I added Computer Science because 1. the ability to analyzing complex datasets are increasingly essential across many fields (that's why I joined DataSquad!), and 2. it's easier to find a good-paying job if you have CS major on your resume. During my time at Carleton, I was part of DataSquad, where I worked on data projects for the campus community (mostly humanity? and tutoring for stats / data visualization classes). Beyond that, I spent a summer interning at Hewlett Packard Enterprise, where I learned about operating systems and parallel computing in the context of supercomputer clusters. The following summer, I conducted microbiome research at the Joslin Diabetes Center (under Harvard Medical School) through the Kolenkow-Reitz Fellowship. I also worked in Dr. Rika Anderson’s lab, exploring how genes—especially functional genes, and toxin–antitoxin systems—spread through transposases in deep-ocean microbes.. Currently, I’m a PhD student at Washington University in St. Louis, studying animal behavior and systems neuroscience. My research focuses on how the motor cortex enables the flexible and elegant movements of freely behaving mice. If you’d like to connect or learn more about my experiences, feel free to reach out at zhong.juntao.2019@ gmail.com."
