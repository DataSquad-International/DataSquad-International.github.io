bio: "Yoni Blumberg graduated magna cum laude from Carleton in 2013 with a degree in Political Science and International Relations. At Carleton, he focused on global development and sustainability, co-founded Students for a New Economy, served on the College Council and Budget Committee, and was awarded a Davis Projects for Peace grant to design a grassroots education initiative in Pakistan. He also spent summers doing research with WorldFish in Washington, D.C., and living in Rwanda through a social innovation fellowship. After graduation, Yoni joined the New Sector Alliance Residency in Social Enterprise, working at SaverLife (then EARN) to expand savings tools for low-income households. From there, he became the first Product Manager at Tala, a global startup expanding access to credit. At Tala, he helped scale the company from 500 customers to over 1.3 million, leading product launches in Tanzania, the Philippines, and India, and designing new tools to help people save and manage money. In 2018, he moved to St. Louis, where he deepened his focus on racial equity and civic leadership as a Coro Fellow, a policy fellow at Forward Through Ferguson, and an independent consultant. Since 2020, he has served in senior leadership roles at WEPOWER, where he works with Black and Latinx communities to build power and community wealth. His projects there have included launching an investment fund for local businesses, raising millions in grants and investments, and developing regional strategies for worker ownership and shared governance. Across these diverse roles, he has drawn on data wrangling, analysis, and presentation skills to identify insights, inform strategic decisions, and communicate effectively."
