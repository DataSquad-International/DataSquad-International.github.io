bio: "Hello! My name is Avery and I'm a Computer Science major with minors in Mathematics and Public Policy. I have experience with the entire flow of data through a project, from gathering data through web scraping to interpreting and visually presenting the results of statistical analysis. I've enjoyed applying my skills on projects in a variety of fields, including political science and athletics. Working with DataSquad is a great way for me to help the Carleton community while gaining valuable coding and statistics experience."
