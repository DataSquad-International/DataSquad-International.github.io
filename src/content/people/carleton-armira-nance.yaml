bio: "My name is Armira Nance and I'm a Computer Science major (Women's and Gender Studies minor) here at Carleton College! I'm a classic jack-of-all-trades, having had experiences and interests in a pretty interesting variety of tech and non-tech areas of study such as studies in religion, open-source software, watercolor painting, and aquatic mammals! My long-term career interest lies at the intersection of computer science and psychology, and my hope is that I'll be able to analyze (and likely visualize) data from research on neurodivergent children and adolescents to advocate for changes in ableist legislature and policy that make for conditions under which many undiagnosed neurodivergent children are forced to endure trauma. (As you can see, I also have a knack for writing incredibly long sentences.) I'm looking forward to bringing my scattered knowledge and experience to the DataSquad as well as a (hopefully) different perspective on things!"
