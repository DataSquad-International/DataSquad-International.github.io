bio: "Hi! My name is Alex Widman and I'm a sophomore Sociology & Anthropology (SOAN) major. I'm from Seattle, WA and you can usually find me either hammocking (the act of being in a hammock) or absorbed in an album on my signature noise-cancelling headphones. love learning about how people interact with systems and institutions in place, naturally drawing me to DataSquads' projects. I hope to use my experiences with DataSquad to inform future studies in demography, social statistics, and data's applicability to public health."
