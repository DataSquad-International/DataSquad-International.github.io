bio: "Hi everyone! My name is Ton Meesena. I am a Junior math major from Thailand. My leisure activities are playing guitar, solving math problems, and listening to podcasts. I enjoy working on data-related projects and spotting fascinating insights from the messy information. At the DataSquad, I have had great times helping people and experiencing several cool projects. If there is anything I can accommodate, please feel free to say hi or email me."
